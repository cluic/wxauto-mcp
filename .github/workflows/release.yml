name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: |
        python -m build --outdir dist/

    - name: Check version
      id: check_version
      run: |
        VERSION=$(echo ${{ github.ref_name }} | sed 's/tags\///')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          ## wxauto MCP Server ${{ github.ref_name }}

          ### 安装
          ```bash
          pip install wxauto-mcp
          ```

          ### 快速开始
          ```bash
          # 检查状态
          wxauto-mcp --status

          # 启动HTTP服务器
          wxauto-mcp-http --port 8181

          # 一键安装到AI应用
          wxauto-mcp --install
          ```

          ### 更新内容
          - 详细的更新日志请查看 commits

          ### 文档
          - [使用说明](https://github.com/wxauto-mcp/wxauto-mcp#readme)
          - [功能特性](https://github.com/wxauto-mcp/wxauto-mcp#-功能特性)
        files: |
          dist/*.whl
          dist/*.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
